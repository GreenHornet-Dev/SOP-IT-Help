<style>
/* ===== CSS VARIABLES (themes) ===== */
:root {
  --navy-900: #0a1628;
  --navy-800: #0f2044;
  --navy-700: #162a55;
  --navy-600: #1e3a6e;
  --teal-500: #00b4d8;
  --teal-400: #48cae4;
  --teal-300: #90e0ef;
  --accent:   #00b4d8;
  --bg:       #0a1628;
  --bg2:      #0f2044;
  --bg3:      #162a55;
  --sidebar-bg: #091526;
  --sidebar-hover: #162a55;
  --text:     #e2e8f0;
  --text-muted: #94a3b8;
  --border:   #1e3a6e;
  --code-bg:  #0d1117;
  --link:     #48cae4;
  --warning-bg: #1a1200;
  --warning-border: #f59e0b;
  --warning-text: #fbbf24;
  --tip-bg: #001a0d;
  --tip-border: #22c55e;
  --tip-text: #4ade80;
  --info-bg: #001829;
  --info-border: #00b4d8;
  --info-text: #67e8f9;
  --scrollbar-track: #0f2044;
  --scrollbar-thumb: #1e3a6e;
  --header-height: 60px;
  --sidebar-width: 280px;
  --table-head-bg: #0f2044;
  --table-row-alt: #0c1a36;
  --badge-bg: #1e3a6e;
  --badge-text: #90e0ef;
  --toc-bg: #0c1830;
  --toc-border: #1e3a6e;
  --active-bg: #1e3a6e;
  --active-border: #00b4d8;
}

[data-theme="light"] {
  --bg:       #f0f4f8;
  --bg2:      #ffffff;
  --bg3:      #e2e8f0;
  --sidebar-bg: #1e3a6e;
  --sidebar-hover: #162a55;
  --text:     #1e293b;
  --text-muted: #64748b;
  --border:   #cbd5e1;
  --code-bg:  #f8fafc;
  --link:     #0369a1;
  --warning-bg: #fffbeb;
  --warning-border: #f59e0b;
  --warning-text: #92400e;
  --tip-bg: #f0fdf4;
  --tip-border: #22c55e;
  --tip-text: #15803d;
  --info-bg: #eff6ff;
  --info-border: #3b82f6;
  --info-text: #1e40af;
  --scrollbar-track: #e2e8f0;
  --scrollbar-thumb: #94a3b8;
  --table-head-bg: #1e3a6e;
  --table-row-alt: #f8fafc;
  --badge-bg: #dbeafe;
  --badge-text: #1e40af;
  --toc-bg: #f0f9ff;
  --toc-border: #93c5fd;
  --active-bg: #dbeafe;
  --active-border: #3b82f6;
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  font-size: 15px;
  transition: background 0.25s, color 0.25s;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ===== HEADER ===== */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-height);
  background: #091526;
  border-bottom: 2px solid var(--accent);
  display: flex; align-items: center;
  padding: 0 1rem; gap: 0.75rem;
  z-index: 200;
  box-shadow: 0 2px 16px rgba(0,180,216,0.15);
}

[data-theme="light"] #header { background: #0f2044; }

#hamburger {
  display: none; background: none; border: none;
  color: var(--teal-400); cursor: pointer;
  padding: 6px; border-radius: 6px; font-size: 1.4rem;
  line-height: 1; flex-shrink: 0;
}
#hamburger:hover { background: #1e3a6e; }

#header-brand {
  font-size: 1.15rem; font-weight: 700; color: #fff;
  white-space: nowrap; flex-shrink: 0; letter-spacing: -0.01em;
}
#header-brand span { color: var(--teal-400); }

#search-wrapper {
  flex: 1; max-width: 480px; position: relative;
}

#search-input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 8px; color: #fff;
  padding: 7px 14px 7px 38px; font-size: 0.9rem;
  outline: none; transition: border-color 0.2s;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: rgba(255,255,255,0.45); }

.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: rgba(255,255,255,0.45);
  font-size: 1rem; pointer-events: none;
}

#search-results {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: none; max-height: 320px; overflow-y: auto;
  z-index: 300;
}
#search-results.visible { display: block; }

.sr-item {
  padding: 10px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem; transition: background 0.15s;
  color: var(--text);
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover, .sr-item.focused { background: var(--bg3); }
.sr-item .sr-cat { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }

#header-actions {
  display: flex; align-items: center; gap: 0.5rem;
  margin-left: auto; flex-shrink: 0;
}

.icon-btn {
  background: none;
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 8px; color: var(--teal-400);
  cursor: pointer; padding: 6px 10px; font-size: 1rem;
  display: flex; align-items: center; gap: 4px;
  transition: background 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.icon-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

/* ===== LAYOUT ===== */
#layout {
  display: flex;
  margin-top: var(--header-height);
  min-height: calc(100vh - var(--header-height));
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: var(--sidebar-width); flex-shrink: 0;
  background: var(--sidebar-bg);
  border-right: 1px solid rgba(255,255,255,0.07);
  position: fixed; top: var(--header-height); bottom: 0; left: 0;
  overflow-y: auto; z-index: 100;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}

#sidebar-inner { padding: 0.75rem 0; }

.cat-label {
  font-size: 0.7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--teal-400);
  padding: 1rem 1rem 0.4rem;
  display: flex; align-items: center; gap: 6px;
}

.cat-divider {
  height: 1px;
  background: rgba(255,255,255,0.07);
  margin: 0.3rem 1rem 0.4rem;
}

.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 1rem; cursor: pointer;
  border-left: 3px solid transparent;
  color: rgba(255,255,255,0.72);
  font-size: 0.875rem;
  transition: all 0.15s;
  line-height: 1.3;
}
.nav-item:hover {
  background: rgba(255,255,255,0.07);
  color: #fff; border-left-color: var(--teal-500);
}
.nav-item.active {
  background: rgba(0,180,216,0.12);
  color: var(--teal-300);
  border-left-color: var(--accent);
  font-weight: 600;
}
.nav-item .nav-emoji {
  flex-shrink: 0; font-size: 1rem; width: 20px; text-align: center;
}

#sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 99;
}

/* ===== MAIN CONTENT ===== */
#main {
  margin-left: var(--sidebar-width); flex: 1; min-width: 0;
  padding: 2rem; max-width: 900px;
}

/* ===== WELCOME ===== */
#welcome { text-align: center; padding: 3rem 1rem; }
#welcome h1 {
  font-size: 2rem; font-weight: 800;
  color: var(--teal-400); margin-bottom: 1rem;
}
#welcome p {
  color: var(--text-muted); max-width: 500px;
  margin: 0 auto 1.5rem; font-size: 1rem;
}

.welcome-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem; margin-top: 2rem; text-align: left;
}

.welcome-card {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 12px; padding: 1rem;
  cursor: pointer; transition: all 0.2s;
}
.welcome-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,180,216,0.15);
}
.welcome-card .wc-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
.welcome-card .wc-name { font-weight: 600; font-size: 0.9rem; color: var(--text); }
.welcome-card .wc-cat { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

/* ===== SOP VIEW ===== */
#sop-view { display: none; }

.sop-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 1rem;
  margin-bottom: 1.5rem; padding-bottom: 1rem;
  border-bottom: 2px solid var(--border); flex-wrap: wrap;
}

.sop-title {
  font-size: 1.75rem; font-weight: 800;
  color: var(--teal-400); line-height: 1.2;
}

.sop-badge {
  display: inline-block;
  background: var(--badge-bg); color: var(--badge-text);
  font-size: 0.75rem; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  white-space: nowrap; margin-top: 6px;
}

.sop-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

/* ===== TOC ===== */
#toc-container {
  background: var(--toc-bg);
  border: 1.5px solid var(--toc-border);
  border-radius: 10px; padding: 1rem 1.25rem;
  margin-bottom: 1.75rem; display: none;
}
#toc-container h4 {
  font-size: 0.8rem; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--accent);
  margin-bottom: 0.6rem; font-weight: 700;
}
#toc-list { list-style: none; }
#toc-list li { padding: 2px 0; }
#toc-list a {
  color: var(--link); text-decoration: none;
  font-size: 0.875rem; opacity: 0.9;
}
#toc-list a:hover { text-decoration: underline; opacity: 1; }
#toc-list .toc-h3 { padding-left: 1rem; }
#toc-list .toc-h4 { padding-left: 2rem; font-size: 0.8rem; }

/* ===== MARKDOWN CONTENT ===== */
#content-body h1, #content-body h2,
#content-body h3, #content-body h4 {
  color: var(--teal-400); font-weight: 700;
  margin: 1.75rem 0 0.75rem; line-height: 1.3;
}
#content-body h1 {
  font-size: 1.6rem;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0.4rem;
}
#content-body h2 {
  font-size: 1.3rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.3rem;
}
#content-body h3 { font-size: 1.1rem; }
#content-body h4 { font-size: 1rem; color: var(--teal-300); }
#content-body p { margin: 0.75rem 0; color: var(--text); }
#content-body a { color: var(--link); text-decoration: none; }
#content-body a:hover { text-decoration: underline; }
#content-body ul, #content-body ol { margin: 0.75rem 0 0.75rem 1.5rem; }
#content-body li { margin: 0.3rem 0; }
#content-body strong { color: var(--teal-300); font-weight: 600; }
#content-body em { color: var(--text-muted); font-style: italic; }
#content-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

/* ===== CODE ===== */
#content-body pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem 1.25rem;
  overflow-x: auto; margin: 1rem 0; font-size: 0.85rem;
  position: relative;
}
#content-body pre code {
  background: none; padding: 0;
  font-family: "Cascadia Code","Fira Code","Consolas","Courier New",monospace;
  font-size: 0.85rem;
}
#content-body code {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 6px;
  font-family: "Cascadia Code","Fira Code","Consolas","Courier New",monospace;
  font-size: 0.85em; color: var(--teal-300);
}
[data-theme="light"] #content-body code {
  color: #0369a1; background: #f0f9ff; border-color: #bae6fd;
}
[data-theme="light"] #content-body pre code { color: inherit; }

/* Copy button */
.code-wrapper { position: relative; }
.copy-btn {
  position: absolute; top: 8px; right: 8px;
  background: rgba(30,58,110,0.8);
  border: 1px solid var(--border); color: var(--text-muted);
  border-radius: 5px; padding: 3px 8px;
  font-size: 0.75rem; cursor: pointer; transition: all 0.2s;
  opacity: 0;
}
.code-wrapper:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.copy-btn.copied { background: #16a34a; color: #fff; border-color: #16a34a; }

/* ===== TABLES ===== */
#content-body table {
  width: 100%; border-collapse: collapse;
  margin: 1rem 0; font-size: 0.875rem;
  border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border);
}
#content-body th {
  background: var(--table-head-bg);
  color: var(--teal-300); font-weight: 700;
  text-align: left; padding: 10px 14px;
  font-size: 0.8rem; text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 2px solid var(--border);
}
[data-theme="light"] #content-body th {
  background: #0f2044; color: var(--teal-300);
}
#content-body td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
#content-body tr:nth-child(even) td { background: var(--table-row-alt); }
#content-body tr:last-child td { border-bottom: none; }
#content-body tr:hover td { background: rgba(0,180,216,0.06); }

/* ===== BLOCKQUOTES ===== */
#content-body blockquote {
  border-left: 4px solid var(--info-border);
  background: var(--info-bg); color: var(--info-text);
  padding: 0.85rem 1rem 0.85rem 1.1rem;
  border-radius: 0 8px 8px 0; margin: 1rem 0; font-size: 0.9rem;
}
#content-body blockquote p { color: inherit; margin: 0.25rem 0; }
#content-body blockquote p:first-child { margin-top: 0; }
#content-body blockquote p:last-child { margin-bottom: 0; }
#content-body blockquote.warning {
  border-left-color: var(--warning-border);
  background: var(--warning-bg); color: var(--warning-text);
}
#content-body blockquote.tip {
  border-left-color: var(--tip-border);
  background: var(--tip-bg); color: var(--tip-text);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  #hamburger { display: flex; }
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #sidebar-overlay.visible { display: block; }
  #main { margin-left: 0; padding: 1.25rem; }
  #header-brand { font-size: 1rem; }
  .sop-title { font-size: 1.4rem; }
  #content-body table { font-size: 0.8rem; }
  #content-body th, #content-body td { padding: 7px 10px; }
}

@media (max-width: 480px) {
  #main { padding: 1rem; }
  #header { padding: 0 0.75rem; gap: 0.5rem; }
  #header-brand { display: none; }
  #search-wrapper { max-width: none; }
}

/* ===== PRINT ===== */
@media print {
  #header, #sidebar, #sidebar-overlay, .sop-actions,
  .copy-btn, #hamburger, #search-wrapper, #header-actions { display: none !important; }
  #main { margin-left: 0 !important; padding: 0 !important; max-width: none !important; }
  #layout { display: block !important; }
  body { background: #fff !important; color: #000 !important; font-size: 11pt; }
  #welcome { display: none !important; }
  #sop-view { display: block !important; }
  #content-body h1, #content-body h2,
  #content-body h3, #content-body h4 { color: #000 !important; }
  #content-body pre {
    background: #f5f5f5 !important; border: 1px solid #ccc !important;
    color: #000 !important; white-space: pre-wrap; word-break: break-all;
  }
  #content-body pre code { color: #000 !important; }
  #content-body code {
    background: #f5f5f5 !important; color: #000 !important;
    border: 1px solid #ccc !important;
  }
  #content-body table { page-break-inside: avoid; }
  #content-body th { background: #e5e5e5 !important; color: #000 !important; }
  #content-body blockquote {
    border-left: 3px solid #333 !important;
    background: #f9f9f9 !important; color: #333 !important;
  }
  #toc-container { display: none !important; }
  a { color: #000 !important; text-decoration: none; }
  h2 { page-break-after: avoid; }
  h3 { page-break-after: avoid; }
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
#content-body { animation: fadeIn 0.25s ease; }
</style>
</head>

    <!-- SOP View -->
    <div id="sop-view">
      <div class="sop-header">
        <div>
          <div class="sop-title" id="sop-title"></div>
          <span class="sop-badge" id="sop-badge"></span>

        <div class="sop-actions">
          <button class="icon-btn" onclick="window.print()" title="Print this SOP">🖨️ Print</button>

  "new-hire-checklist": `# 👤 New Hire IT Checklist

**Tag:** New Hire

Complete IT setup for a new employee in Microsoft 365.

---

## Step 1 — Create the M365 Account

| # | What to do | How to do it |
|---|------------|--------------|
| 1 | Go to Microsoft 365 Admin Center | https://admin.microsoft.com > Users > Active Users > Add a user |
| 2 | Fill in name, username, and temp password | Set username as firstname.lastname@domain.com |
| 3 | Assign a license | Check the appropriate M365 license (Business Standard, E3, etc.) |
| 4 | Finish and save | Click Add and close |

---

## Step 2 — Add to Distribution Groups (PowerShell)

> Run in PowerShell as Admin

\`\`\`powershell
# Connect to Exchange Online
connect-exchangeonline -ShowBanner:$false

# Add to All Users distribution group
Add-DistributionGroupMember \`
    -Identity "#All Users" \`
    -Member user@domain.com
\`\`\`

---

## Step 3 — Assign Additional Licenses (PowerShell)

> Run in PowerShell as Admin

\`\`\`powershell
# Connect to Microsoft Graph
Connect-MgGraph -Scopes "User.ReadWrite.All","Directory.ReadWrite.All"

# Find the user's object ID
$user = Get-MgUser -Filter "userPrincipalName eq 'user@domain.com'"

# Find the license SKU ID (example: Microsoft 365 Business Standard)
$sku = Get-MgSubscribedSku | Where-Object { $_.SkuPartNumber -eq 'O365_BUSINESS_PREMIUM' }

# Assign the license
Set-MgUserLicense -UserId $user.Id \`
    -AddLicenses @{SkuId = $sku.SkuId} \`
    -RemoveLicenses @()
\`\`\`

---

## Step 4 — Add to Security Groups / Teams (Admin Center)

| # | What to do | How to do it |
|---|------------|--------------|
| 1 | Open Azure AD or M365 Admin > Groups | Find the relevant department group |
| 2 | Add the new user as a member | Click the group > Members > Add members |
| 3 | Add to Microsoft Teams | Open Teams > find the team > Add member |

---

## Step 5 — Configure Device

| # | What to do | How to do it |
|---|------------|--------------|

## Step 6 — Confirm Setup

| # | Check | Expected Result |
|---|-------|-----------------|

| 2 | Email receives messages | Yes |

| 4 | License assigned | Visible in M365 Admin |

## Step 7 — Change UPN if Needed (PowerShell)

> Use this if the user's username/email needs to be corrected after initial setup.

\`\`\`powershell
# Connect to Microsoft Graph
Connect-MgGraph -Scopes "User.ReadWrite.All"

# Change the UPN (login/email address)
Update-MgUser \`
    -UserId "oldname@domain.com" \`
    -UserPrincipalName "newname@domain.com"

# Verify the change

    -Property "DisplayName,UserPrincipalName,Mail,AccountEnabled"

$user | Select-Object DisplayName, UserPrincipalName, Mail, AccountEnabled

  "departing-employee-checklist": `# 🚶 Departing Employee IT Checklist

**Tag:** Offboarding

Securely offboard a departing employee from Microsoft 365 and company systems.

> ⚠️ Complete these steps on or before the employee's last day.

---

## Step 1 — Block Sign-In (PowerShell)

> Run in PowerShell as Admin

\`\`\`powershell
# Connect to Microsoft Graph
Connect-MgGraph -Scopes "User.ReadWrite.All"

# Block sign-in for the departing user
Update-MgUser -UserId "user@domain.com" -AccountEnabled:$false
\`\`\`

---

## Step 2 — Revoke All Active Sessions (PowerShell)

\`\`\`powershell
# Revoke all refresh tokens / active sessions immediately
Revoke-MgUserSignInSession -UserId "user@domain.com"
\`\`\`

---

## Step 3 — Reset Password (PowerShell)

\`\`\`powershell
# Set a new random password to lock out the user
$newPassword = @{
    Password = "TempP@ss" + (Get-Random -Maximum 9999)
    ForceChangePasswordNextSignIn = $false
}
Update-MgUser -UserId "user@domain.com" -PasswordProfile $newPassword
\`\`\`

---

## Step 4 — Remove from Distribution Groups (PowerShell)

\`\`\`powershell
# Connect to Exchange Online
connect-exchangeonline -ShowBanner:$false

# Remove from All Users group
Remove-DistributionGroupMember \`
    -Identity "#All Users" \`
    -Member "user@domain.com" \`
    -Confirm:$false

# Check all groups the user belongs to and remove as needed
Get-DistributionGroup | Where-Object {
    (Get-DistributionGroupMember $_.Identity | Select-Object -ExpandProperty PrimarySmtpAddress) -contains "user@domain.com"
} | ForEach-Object {
    Remove-DistributionGroupMember -Identity $_.Identity -Member "user@domain.com" -Confirm:$false
}
\`\`\`

---

## Step 5 — Convert Mailbox to Shared (PowerShell)

\`\`\`powershell
# Convert mailbox to shared so email is retained without a license
Set-Mailbox -Identity "user@domain.com" -Type Shared
\`\`\`

---

## Step 6 — Remove License (PowerShell)

\`\`\`powershell
# Connect to Microsoft Graph
Connect-MgGraph -Scopes "User.ReadWrite.All","Directory.ReadWrite.All"

# Get the user and their assigned licenses
$user = Get-MgUser -Filter "userPrincipalName eq 'user@domain.com'"
$licenses = (Get-MgUserLicenseDetail -UserId $user.Id).SkuId

# Remove all licenses
Set-MgUserLicense -UserId $user.Id \`
    -AddLicenses @() \`
    -RemoveLicenses $licenses
\`\`\`

---

## Step 7 — Set Out-of-Office Auto-Reply (PowerShell)

\`\`\`powershell
# Set automatic reply so senders know the person has left
Set-MailboxAutoReplyConfiguration \`
    -Identity "user@domain.com" \`
    -AutoReplyState Enabled \`
    -InternalMessage "This employee is no longer with the company. Please contact manager@domain.com." \`
    -ExternalMessage "This employee is no longer with the company. Please contact manager@domain.com."
\`\`\`

---

## Step 8 — Grant Mailbox Access to Manager (PowerShell)

\`\`\`powershell
# Give the manager full access to the former employee's mailbox
Add-MailboxPermission \`
    -Identity "user@domain.com" \`
    -User "manager@domain.com" \`
    -AccessRights FullAccess \`
    -InheritanceType All
\`\`\`

---

## Step 9 — Remove from Azure AD / Security Groups (Admin Center)

| # | What to do | How to do it |
|---|------------|--------------|
| 1 | Open M365 Admin > Groups | Remove user from any security or M365 groups |
| 2 | Remove from Microsoft Teams | Open Teams Admin > Users > find user > remove from teams |
| 3 | Remove from shared drives | Check SharePoint/OneDrive and revoke access |

---

## Step 10 — Final Checks

| # | Check | Expected Result |
|---|-------|-----------------|
| 1 | Sign-in blocked | User cannot log in |
| 2 | Sessions revoked | All devices signed out |
| 3 | Mailbox converted to shared | No license consumed |
| 4 | Auto-reply active | Senders receive OOO message |
| 5 | License removed | Freed up in M365 Admin |
| 6 | Removed from all groups | Verified in Exchange Admin |
| 7 | Manager has mailbox access | Verified in Exchange Admin |
| 8 | Email forwarding set | Points to manager's address |
| 9 | Equipment returned or wiped | All devices accounted for |

---

## Step 11 — Forward Email to Manager (PowerShell)

\`\`\`powershell
# Connect to Exchange Online
connect-exchangeonline -ShowBanner:$false

# Forward all incoming email to manager
Set-Mailbox -Identity "user@domain.com" \`
    -ForwardingSmtpAddress "manager@domain.com" \`
    -DeliverToMailboxAndForward $false
\`\`\`

> **Note:** Set \`-DeliverToMailboxAndForward $true\` if you want a copy kept in the original mailbox as well.

---

## Step 12 — Equipment Return Checklist

| # | Item | Action | Notes |
|---|------|--------|-------|
| 1 | Laptop / Desktop | Collected and wiped | Remote wipe via Intune if not returned |
| 2 | Phone / Mobile device | Collected and factory reset | Remote wipe via Intune if not returned |
| 3 | Chargers & cables | Collected | Check for laptop charger, phone charger |
| 4 | Key fobs / badge | Collected and deactivated | Notify building security |
| 5 | Headset / peripherals | Collected | Log in asset tracker |
| 6 | Company credit card | Collected and cancelled | Notify finance/accounting |
| 7 | Parking pass | Collected | Return to office manager |

### Remote Wipe via Intune (PowerShell)

\`\`\`powershell
# Install Microsoft Graph if needed
# Install-Module Microsoft.Graph -Force

Connect-MgGraph -Scopes "DeviceManagementManagedDevices.ReadWrite.All"

# Find the device by user
$devices = Get-MgUserManagedDevice -UserId "user@domain.com"

# Wipe each device
foreach ($device in $devices) {
    Write-Host "Wiping device: $($device.DeviceName)"
    Clear-MgDeviceManagementManagedDevice -ManagedDeviceId $device.Id
}
\`\`\`

> ⚠️ **This wipe is irreversible.** Confirm the device has been recovered or is unrecoverable before running.

---

## Step 13 — Notify HR: Equipment All Clear (Power Automate)

> Once all equipment in Step 12 is confirmed collected and wiped, run the Power Automate flow to send HR an automatic "All Clear" notification.

**Flow name:** \`HR Equipment Return — All Clear Notification\`

| Step | Action |
|------|--------|
| 1 | Go to [flow.microsoft.com](https://flow.microsoft.com) and open **My Flows** |
| 2 | Find and run **HR Equipment Return — All Clear Notification** |
| 3 | Enter: Employee Name, Employee Email, Manager Email, Return Date |
| 4 | Submit — HR will receive a confirmation email automatically |

> **See also:** [Power Automate SOP](./power-automate.md) for full flow setup instructions.

  "okta": `# Okta — Token Sync Issues After Password Change

> **Purpose:** Step-by-step resolution for Okta token sync failures after a password change, including re-authenticating Office 365 apps, fixing OneDrive sync crashes, and restoring performance via the Okta dashboard.

---

## Table of Contents

1. [What Happens After an Okta Password Change](#1-what-happens-after-an-okta-password-change)
2. [Step 1 — Re-Authenticate via Okta Dashboard](#2-step-1--re-authenticate-via-okta-dashboard)
3. [Step 2 — Fix Office Apps Token (Word, Excel, Outlook, Teams)](#3-step-2--fix-office-apps-token-word-excel-outlook-teams)
4. [Step 3 — Fix OneDrive Sync Crash & Performance](#4-step-3--fix-onedrive-sync-crash--performance)
5. [Step 4 — Clear Stale Credentials from Windows Credential Manager](#5-step-4--clear-stale-credentials-from-windows-credential-manager)
6. [Step 5 — Verify Everything is Working](#6-step-5--verify-everything-is-working)
7. [Quick Reference — One-Liners](#7-quick-reference--one-liners)

---

## 1. What Happens After an Okta Password Change

When a user changes their Okta password, the following can break:

| Symptom | Root Cause |
|---------|------------|
| Office apps (Word, Excel, Outlook) keep prompting for sign-in | Cached OAuth token is expired/invalid |
| OneDrive stops syncing, freezes, or crashes Explorer | OneDrive holds a stale Okta token and loops trying to refresh it |
| High CPU/memory usage after password change | OneDrive sync process is stuck in a retry loop |
| Teams shows "You\\'re signed out" or goes offline | Teams token tied to Okta SSO is invalidated |
| Browser apps still work but desktop apps don\\'t | Browser picks up new Okta session cookie; desktop apps use cached tokens |

> **Root cause:** Office desktop apps and OneDrive cache OAuth tokens independently of the browser. After an Okta password change, these cached tokens become invalid but the apps keep retrying silently — causing CPU spikes, crashes, and sync failures.

---

## 2. Step 1 — Re-Authenticate via Okta Dashboard

> **Do this first.** The Okta dashboard is the authoritative source for passing a fresh token to connected apps.

| Step | Action |
|------|--------|
| 1 | Open a browser and go to your Okta org URL (e.g., \`https://yourcompany.okta.com\`) |
| 2 | Sign in with the **new password** |
| 3 | Once logged in, click your **name/avatar > Settings** |
| 4 | Scroll to **Security > Sessions** and click **Sign out all devices** to clear all stale sessions |
| 5 | Sign back in to the Okta dashboard with new credentials |
| 6 | Launch **Office 365** from the Okta dashboard (via the app tile) — this passes a fresh SAML/OIDC token to the app |
| 7 | Repeat for **OneDrive**, **Teams**, and any other tiles |

> **Why this works:** Launching apps from the Okta dashboard initiates a new SSO assertion, passing a fresh token directly to the app rather than relying on the stale cached token.

---

## 3. Step 2 — Fix Office Apps Token (Word, Excel, Outlook, Teams)

### Windows — Sign Out and Back In

| Step | Action |
|------|--------|
| 1 | Open any Office app (Word, Excel, Outlook) |
| 2 | Go to **File > Account** |
| 3 | Click **Sign Out** under the user\\'s name |
| 4 | Close **all** Office apps completely (check Task Manager — kill any remaining Office processes) |
| 5 | Reopen the Office app |
| 6 | Sign in with the **new Okta-linked Microsoft credentials** |
| 7 | If prompted with MFA, complete it |

### Kill All Office Processes (PowerShell)

\`\`\`powershell
Get-Process -Name WINWORD, EXCEL, OUTLOOK, TEAMS, ONENOTE, MSACCESS -ErrorAction SilentlyContinue | Stop-Process -Force
\`\`\`

### Clear Office Token Cache (PowerShell — Run as Admin)

\`\`\`powershell
# Clears cached Office identity tokens
Remove-Item -Path "$env:LOCALAPPDATA\\Microsoft\\Office\\16.0\\Licensing" -Recurse -Force -ErrorAction SilentlyContinue
Remove-Item -Path "$env:LOCALAPPDATA\\Microsoft\\identitycache" -Recurse -Force -ErrorAction SilentlyContinue
Remove-Item -Path "$env:APPDATA\\Microsoft\\Protect" -Recurse -Force -ErrorAction SilentlyContinue
Write-Host "Office token cache cleared. Reopen Office apps and sign in."
\`\`\`

> **After running:** Reopen Office apps and sign in fresh via Okta dashboard tile or with Microsoft credentials linked to Okta.

---

## 4. Step 3 — Fix OneDrive Sync Crash & Performance

> OneDrive is the most common performance offender after an Okta password change. It loops trying to refresh a stale token and can consume 30-80% CPU.

### Step-by-Step Fix

| Step | Action |
|------|--------|
| 1 | Right-click the **OneDrive cloud icon** in the system tray |
| 2 | Click **Settings > Account > Unlink this PC** |
| 3 | Confirm — this stops the sync loop immediately |
| 4 | Open **Task Manager** and end any remaining \`OneDrive.exe\` processes |
| 5 | Clear the OneDrive token cache (see PowerShell below) |
| 6 | Reopen OneDrive from Start menu |
| 7 | Sign in with the new credentials when prompted |
| 8 | Allow OneDrive to re-sync (files are not deleted — they remain in the cloud) |

### Stop OneDrive + Clear Token Cache (PowerShell — Run as Admin)

\`\`\`powershell
# Stop OneDrive
Stop-Process -Name OneDrive -Force -ErrorAction SilentlyContinue

# Clear OneDrive token/auth cache
Remove-Item -Path "$env:LOCALAPPDATA\\Microsoft\\OneDrive\\settings" -Recurse -Force -ErrorAction SilentlyContinue
Remove-Item -Path "$env:LOCALAPPDATA\\Microsoft\\OneDrive\\logs" -Recurse -Force -ErrorAction SilentlyContinue

# Restart OneDrive
Start-Process "$env:LOCALAPPDATA\\Microsoft\\OneDrive\\OneDrive.exe"
Write-Host "OneDrive restarted. Sign in with new credentials."
\`\`\`

### If OneDrive is Still Crashing or Looping

\`\`\`powershell
# Full OneDrive reset (keeps files, resets app state)
& "$env:LOCALAPPDATA\\Microsoft\\OneDrive\\OneDrive.exe" /reset
Start-Sleep -Seconds 10
Start-Process "$env:LOCALAPPDATA\\Microsoft\\OneDrive\\OneDrive.exe"
Write-Host "OneDrive reset complete. Sign in with new credentials."
\`\`\`

> **Note:** \`/reset\` does not delete cloud files. It resets the local sync engine state and clears all cached tokens.

---

## 5. Step 4 — Clear Stale Credentials from Windows Credential Manager

> Windows Credential Manager stores cached passwords and tokens. After an Okta password change, old entries cause repeated auth failures.

### Manual Steps

| Step | Action |
|------|--------|
| 1 | Open **Control Panel > Credential Manager** |
| 2 | Click **Windows Credentials** |
| 3 | Look for entries containing: \`MicrosoftOffice\`, \`OneDrive\`, \`Okta\`, \`MicrosoftAccount\`, \`live.com\` |
| 4 | Click each one and select **Remove** |
| 5 | Reboot or restart the affected apps |

### PowerShell — Remove Microsoft/Okta Credential Entries

\`\`\`powershell
# List all Microsoft/Okta credentials stored in Credential Manager
cmdkey /list | Where-Object { $_ -match "Microsoft|Okta|OneDrive|live" }

# Remove specific entries (repeat for each target)
# cmdkey /delete:"target-name-here"

# Remove all MicrosoftOffice16 cached credentials
$creds = cmdkey /list | Select-String "MicrosoftOffice16"
foreach ($c in $creds) {
    $target = ($c -split "Target: ")[1].Trim()
    cmdkey /delete:$target
}
Write-Host "Stale Office credentials removed."
\`\`\`

---

## 6. Step 5 — Verify Everything is Working

| Check | Expected Result |
|-------|-----------------|
| Office app opens without sign-in prompt | Token accepted — auth is working |
| OneDrive cloud icon shows green checkmark | Sync is active and healthy |
| CPU usage back to normal (< 10% idle) | OneDrive sync loop resolved |
| Teams shows online status | Teams token refreshed |
| Okta dashboard shows active session | SSO session is live |

### Quick CPU/OneDrive Check (PowerShell)

\`\`\`powershell
Get-Process OneDrive | Select-Object Name, CPU, WorkingSet | Format-Table -AutoSize
\`\`\`

> If CPU is still high after completing all steps, reboot the machine. A reboot clears all in-memory token caches and forces a clean re-auth.

---

## 7. Quick Reference — One-Liners

| Task | Command |
|------|---------|
| Kill all Office processes | \`Get-Process WINWORD,EXCEL,OUTLOOK,TEAMS -ErrorAction SilentlyContinue \\| Stop-Process -Force\` |
| Stop OneDrive | \`Stop-Process -Name OneDrive -Force\` |
| Reset OneDrive | \`& "$env:LOCALAPPDATA\\Microsoft\\OneDrive\\OneDrive.exe" /reset\` |
| Restart OneDrive | \`Start-Process "$env:LOCALAPPDATA\\Microsoft\\OneDrive\\OneDrive.exe"\` |
| Check OneDrive CPU | \`Get-Process OneDrive \\| Select-Object Name, CPU, WorkingSet\` |
| List credential entries | \`cmdkey /list\` |

---

---

## 8. Hybrid Environment — Okta + Microsoft Entra ID (Azure AD)

> **Applies to:** Organizations using Okta as the primary IdP with Microsoft Entra ID (formerly Azure AD) in a hybrid join or federated configuration. Password changes propagate from Okta → Entra ID → on-prem AD (if synced via Entra Connect).

### Why Hybrid Makes Token Issues Worse

| Layer | What Happens After Password Change |
|-------|------------------------------------|
| **Okta** | New session token issued immediately |
| **Entra ID (cloud)** | Syncs from Okta via OIDC federation — can take 5–15 minutes |
| **On-prem AD** | Syncs via Entra Connect — can take 15–30 minutes |
| **Office apps** | Hold cached Entra ID tokens — stale until cleared |
| **OneDrive** | Authenticates against Entra ID — loops when token mismatches |
| **Windows credential cache** | Holds both Okta and Entra ID tokens separately |

### Step 1 — Check Entra ID Sync Status (PowerShell)

\`\`\`powershell
# Connect to Microsoft Graph (run once)
Connect-MgGraph -Scopes "User.Read.All"

# Check user's last sync time and account enabled status
Get-MgUser -UserId "user@domain.com" | Select-Object DisplayName, UserPrincipalName, AccountEnabled, OnPremisesSyncEnabled, OnPremisesLastSyncDateTime
\`\`\`

> If \`OnPremisesSyncEnabled\` is \`True\`, the password change must propagate through Entra Connect before desktop apps will accept the new token. Wait for sync or force it (see below).

### Step 2 — Force Entra Connect Sync (Run on Entra Connect Server)

\`\`\`powershell
# Force a delta sync from on-prem AD to Entra ID
Import-Module ADSync
Start-ADSyncSyncCycle -PolicyType Delta

# Or full sync if delta doesn't resolve it
Start-ADSyncSyncCycle -PolicyType Initial
\`\`\`

> Run this on the **server running Entra Connect (Azure AD Connect)**. After sync completes (1–2 minutes), the new password hash propagates to Entra ID, and Office apps + OneDrive will accept new credentials.

### Step 3 — Re-Register Windows Device with Entra ID (if device is Hybrid Joined)

> If the device is **Hybrid Entra Joined** (not just registered), the device token itself may be stale after a password change.

\`\`\`powershell
# Check current Entra ID / Azure AD join status
dsregcmd /status
\`\`\`

Look for:
- \`AzureAdJoined : YES\` — device is cloud joined
- \`DomainJoined : YES\` — device is on-prem joined (hybrid)
- \`SSO State\` section — check for \`AzureAdPrt : YES\` (Primary Refresh Token active)

If \`AzureAdPrt\` is **NO** after a password change:

\`\`\`powershell
# Force PRT refresh - run as the affected user (NOT admin)
dsregcmd /refreshprt
\`\`\`

If that fails, sign out and back in to Windows with the new password to refresh the PRT.

### Step 4 — Re-Authenticate OneDrive in Hybrid Environment

In a hybrid setup, OneDrive authenticates against **Entra ID**, not Okta directly. After password change:

| Step | Action |
|------|--------|
| 1 | Wait for Entra Connect sync to complete (or force it — see Step 2) |
| 2 | Unlink OneDrive: system tray > Settings > Account > **Unlink this PC** |
| 3 | Run the OneDrive reset PowerShell (see Step 3 in main SOP) |
| 4 | Sign back in to OneDrive with the **Microsoft/Entra ID account** (not Okta URL directly) |
| 5 | Verify green checkmark in tray within 2–3 minutes |

### Step 5 — Verify Hybrid Token Chain is Clean

\`\`\`powershell
# Confirm PRT (Primary Refresh Token) is valid
dsregcmd /status | findstr /i "AzureAdPrt"

# Confirm Entra ID user is enabled and synced
Get-MgUser -UserId "user@domain.com" | Select-Object AccountEnabled, OnPremisesLastSyncDateTime, PasswordPolicies
\`\`\`

| Expected Output | Means |
|----------------|-------|
| \`AzureAdPrt : YES\` | Device has valid Entra ID session token |
| \`AccountEnabled : True\` | Account not locked in Entra ID |
| \`OnPremisesLastSyncDateTime\` within last 30 min | Sync is current |

> **If AccountEnabled shows False in Entra ID** but the user can log in to Okta — the sync has not propagated yet or there is a conflict. Force a sync cycle and check again in 5 minutes.

> **Summary:** After an Okta password change — always start at the Okta dashboard, launch Office apps from the app tile to pass a fresh token, unlink and re-link OneDrive, and clear stale credentials from Windows Credential Manager. A reboot after completing all steps ensures a clean slate.

## Flow: HR Equipment Return — All Clear Notification

> **Purpose:** When IT confirms all equipment has been returned and wiped during offboarding, this Power Automate flow automatically sends HR an "All Clear" email so they can close out the departing employee's record.

### Trigger
Manually trigger a flow (Power Automate > My Flows > New Flow > Instant cloud flow)

### Flow Steps

| Step | Action | Details |
|------|--------|---------|
| 1 | **Trigger** | Manually trigger a flow — input fields: \`Employee Name\`, \`Employee Email\`, \`Manager Email\`, \`Return Date\` |
| 2 | **Condition** | Check that all items are confirmed (you can use a Yes/No input or a SharePoint list lookup) |
| 3 | **Send an email (V2)** | To: HR email (e.g. \`hr@domain.com\`) — Subject: \`Equipment Return Confirmed – [Employee Name]\` |
| 4 | **Email Body** | Include employee name, return date, list of returned items, and IT sign-off |
| 5 | **Post a Teams message** *(optional)* | Notify the IT channel that offboarding equipment step is complete |
| 6 | **Update SharePoint list** *(optional)* | Mark the offboarding record row as \`Equipment Returned = Yes\` |

### Sample Email Body (paste into the Send Email body field)

\`\`\`
Hi HR Team,

This is an automated notification from IT.

Employee: [Employee Name]
Departure Date: [Return Date]

All company equipment has been confirmed returned and processed:
- Laptop / Desktop: Collected and wiped
- Mobile device: Collected and factory reset
- Key fob / Badge: Deactivated
- Chargers and peripherals: Collected

IT has completed all equipment offboarding steps. You are clear to finalize the employee separation record.

Regards,
IT Department
\`\`\`

### Notes

- Run this flow **after** completing Step 12 (Equipment Return Checklist) in the [Departing Employee Checklist](./departing-employee-checklist.md).
- If using a SharePoint list for offboarding tracking, connect the "Update item" action to mark \`EquipmentReturned = Yes\` and \`ITSignOff = [your name]\`.
- HR receives one clean confirmation email — no back-and-forth needed.

  "lansweeper": `# Lansweeper — Agent, API & Power Automate SOP

> **Purpose:** Guide for IT staff on deploying the Lansweeper agent, using the GraphQL Data API, integrating with Power Automate, and building custom asset reports and tables.

---

## Table of Contents

1. [Lansweeper Agent Deployment](#1-lansweeper-agent-deployment)
2. [API Setup — Authentication & Credentials](#2-api-setup--authentication--credentials)
3. [GraphQL API — Key Queries](#3-graphql-api--key-queries)
4. [Power Automate Integration via HTTP Connector](#4-power-automate-integration-via-http-connector)
5. [Custom Tables & Asset Reporting](#5-custom-tables--asset-reporting)
6. [Useful Links & References](#6-useful-links--references)

---

## 1. Lansweeper Agent Deployment

### What the Agent Does
The Lansweeper LsAgent scans Windows, macOS, and Linux devices that may not be reachable via network scanning (off-site, VPN, or behind firewalls). It reports asset data directly to your Lansweeper Cloud site.

### Deployment Steps

| Step | Action |
|------|--------|
| 1 | Log in to your Lansweeper Site at [app.lansweeper.com](https://app.lansweeper.com) |
| 2 | Go to **Settings > Agent > Download Agent** |
| 3 | Select the OS type (Windows MSI recommended for domain deployment) |
| 4 | Note your **Site Token** — required during install |
| 5 | Deploy via GPO, Intune, or LogMeIn Resolve package |
| 6 | Verify device appears in **Assets** within 15-30 minutes |

### Silent Install (Windows — PowerShell / Intune)

\`\`\`powershell
# Replace <SiteToken> with your actual token from Lansweeper Settings > Agent
msiexec /i LsAgent.msi /quiet SITE_TOKEN="<SiteToken>"
\`\`\`

### Verify Agent is Running

\`\`\`powershell
Get-Service -Name LsAgent | Select-Object Name, Status, StartType
\`\`\`

> **Tip:** If the device does not appear in Lansweeper after 30 minutes, check that the agent service is running and that outbound HTTPS (port 443) is not blocked.

---

## 2. API Setup — Authentication & Credentials

> **Base Endpoint:** \`https://api.lansweeper.com/api/v2/graphql\`
> All requests use **HTTP POST** with a JSON body.

### Create an API Client (Personal Access Token)

| Step | Action |
|------|--------|
| 1 | In your Lansweeper Site, go to **Settings (bottom-left) > Developer Tools > API Clients** |
| 2 | Click **Add New API Client** |
| 3 | Select **Personal Access Token (PAT)** |
| 4 | Give it a name (e.g., \`PowerAutomate-Integration\`) |
| 5 | Copy the **Access Token** — you will not see it again |
| 6 | Store it securely in Azure Key Vault or Power Automate environment variable |

### Required Permissions (Role)

Go to **Configuration > Account Management > Roles & Permissions** and ensure the API client role has:
- View API clients
- Allow API clients to access this site

### Request Headers for All API Calls

\`\`\`
Content-Type: application/json
Authorization: Bearer <your_access_token>
\`\`\`

---

## 3. GraphQL API — Key Queries

### Get Authorized Sites (required before asset queries)

\`\`\`graphql
query {
  authorizedSites {
    sites {
      id
      name
    }
  }
}
\`\`\`

### Get All Assets for a Site

\`\`\`graphql
query GetAssets($siteId: String!) {
  site(id: $siteId) {
    assetResources {
      items {
        assetBasicInfo {
          name
          domain
          ipAddress
          mac
          type
          firstSeen
          lastSeen
        }
        assetCustom {
          serialNumber
          manufacturer
          model
        }
        operatingSystem {
          caption
          version
        }
      }
    }
  }
}
\`\`\`

### Variables block
\`\`\`json
{
  "siteId": "<your-site-id>"
}
\`\`\`

### Get Installed Software for an Asset

\`\`\`graphql
query GetSoftware($siteId: String!, $assetId: String!) {
  site(id: $siteId) {
    asset(id: $assetId) {
      software {
        name
        version
        publisher
        installDate
      }
    }
  }
}
\`\`\`

### Get Custom Fields for Assets

\`\`\`graphql
query GetCustomFields($siteId: String!) {
  site(id: $siteId) {
    assetResources {
      items {
        assetBasicInfo { name }
        assetCustom {
          fields {
            name
            value
          }
        }
      }
    }
  }
}
\`\`\`

---

## 4. Power Automate Integration via HTTP Connector

> Use the **HTTP** action (premium connector) in Power Automate to query the Lansweeper GraphQL API.

### Flow: Query Lansweeper Assets on Schedule

| Step | Action | Detail |
|------|--------|--------|
| 1 | **Trigger** | Recurrence — Daily or on-demand |
| 2 | **Initialize Variable** | Name: \`SiteId\` / Value: your Lansweeper Site ID |
| 3 | **HTTP Action** | Method: \`POST\` / URI: \`https://api.lansweeper.com/api/v2/graphql\` |
| 4 | **Headers** | \`Content-Type: application/json\` / \`Authorization: Bearer <token>\` |
| 5 | **Body** | GraphQL query JSON (see below) |
| 6 | **Parse JSON** | Use the response schema to parse asset data |
| 7 | **Apply to Each** | Loop through asset items |
| 8 | **Action** | Update SharePoint list, send Teams alert, or write to Excel |

### HTTP Action Body (paste into Body field)

\`\`\`json
{
  "query": "query GetAssets($siteId: String!) { site(id: $siteId) { assetResources { items { assetBasicInfo { name ipAddress mac type lastSeen } assetCustom { serialNumber model } operatingSystem { caption } } } } }",
  "variables": {
    "siteId": "@{variables('SiteId')}"
  }
}
\`\`\`

### Store the Token Securely

Do **not** hardcode the API token in the HTTP action. Instead:
- Store it as a **Power Automate Environment Variable** (type: Secret)
- Or retrieve it from **Azure Key Vault** using the Key Vault connector
- Reference it in the Authorization header as \`Bearer @{variables('LansweeperToken')}\`

### Recommended Flow Use Cases

| Use Case | Trigger | Output |
|----------|---------|--------|
| Daily asset inventory snapshot | Recurrence | SharePoint list update |
| New device alert | Recurrence + condition on \`firstSeen\` date | Teams notification |
| Offboarding asset verification | Manually triggered | HR confirmation email via PA |
| Software compliance check | Recurrence | Flag devices missing required apps |

---

## 5. Custom Tables & Asset Reporting

### Creating Custom Fields in Lansweeper

| Step | Action |
|------|--------|
| 1 | Go to **Configuration > Asset Pages > Custom Fields** |
| 2 | Click **Add Field** — choose type: Text, Number, Date, or Dropdown |
| 3 | Name it clearly (prefix with dept, e.g., \`IT_AssetTag\`, \`HR_AssignedUser\`) |
| 4 | Fields appear on individual asset pages and in reports |
| 5 | In the GraphQL API, custom fields are under \`assetCustom.fields\` |

### Building Custom Reports

| Step | Action |
|------|--------|
| 1 | Go to **Reports > Create New Report** |
| 2 | Select asset type (Windows, Network, All assets, etc.) |
| 3 | Add columns — custom fields are available under the **Custom** category |
| 4 | Filter by OS, last seen date, asset type, IP range, or custom field value |
| 5 | Save and optionally **Expose to API** (for Power BI or PA use) |
| 6 | Pin report to Dashboard as a **Table widget** for at-a-glance view |

### Expose Report to API (for Power BI / Power Automate)

1. Open your saved report
2. Click **Report Settings > Expose to API**
3. Use the report ID in your GraphQL query under \`authorizedReports\`
4. Query it via PA HTTP connector on a schedule to feed Power BI or SharePoint

### Custom Dashboard Widgets

| Widget Type | Best For |
|-------------|----------|
| **Table** | Show report results at a glance (e.g., assets not seen in 30 days) |
| **Report Overview** | Alert-style list of reports needing attention |
| **Count** | Total assets, Windows vs Mac, online vs offline |
| **Chart** | OS distribution, asset type breakdown |

---

## 6. Useful Links & References

| Resource | URL |
|----------|-----|
| Lansweeper Developer Portal | https://developer.lansweeper.com |
| GraphQL API Quickstart | https://developer.lansweeper.com/docs/data-api/get-started/quickstart/ |
| GraphQL Endpoint | https://api.lansweeper.com/api/v2/graphql |
| API Types Reference | https://developer.lansweeper.com/docs/data-api/reference/types/ |
| Lansweeper App (login) | https://app.lansweeper.com |
| Custom Fields Guide | https://www.lansweeper.com/blog/pro-tips/consolidating-your-custom-fields/ |
| Importing Data via API | https://www.lansweeper.com/blog/pro-tips/importing-data-with-the-lansweeper-api/ |

---

| # | What to do | How to do it |

const categoriesOrder = ["Reference", "Onboarding", "Communication", "Hardware", "Security", "Software", "Tools & Admin"];

// ===== THEME =====
(function() {
  const saved = localStorage.getItem('sop-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeIcon(saved);
  document.getElementById('hljs-theme-css').textContent = hljsThemes[saved] || hljsThemes.dark;
})();

function updateThemeIcon(theme) {
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('sop-theme', next);
  updateThemeIcon(next);
  document.getElementById('hljs-theme-css').textContent = hljsThemes[next] || hljsThemes.dark;
}

// ===== SIDEBAR =====
function buildSidebar() {
  const inner = document.getElementById('sidebar-inner');
  inner.innerHTML = '';
  const catIcons = {
    'Reference':'📖','Onboarding':'🚀','Communication':'📬',
    'Hardware':'🖨️','Security':'🔐','Software':'💼','Tools & Admin':'🔧'
  };
  for (const cat of categoriesOrder) {
    const keys = Object.entries(sopMeta)
      .filter(([k,v]) => v.category === cat).map(([k]) => k);
    if (!keys.length) continue;
    const catLabel = document.createElement('div');
    catLabel.className = 'cat-label';
    catLabel.textContent = (catIcons[cat] || '📁') + ' ' + cat;
    inner.appendChild(catLabel);
    for (const key of keys) {
      const meta = sopMeta[key];
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.id = 'nav-' + key;
      item.setAttribute('data-key', key);
      item.setAttribute('tabindex', '0');
      item.setAttribute('role', 'button');
      const emoji = document.createElement('span');
      emoji.className = 'nav-emoji';
      emoji.textContent = meta.emoji;
      item.appendChild(emoji);
      item.appendChild(document.createTextNode(meta.name));
      item.addEventListener('click', () => loadSOP(key));
      item.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') loadSOP(key);
      });
      inner.appendChild(item);
    }
    const divider = document.createElement('div');
    divider.className = 'cat-divider';
    inner.appendChild(divider);
  }
}

// ===== WELCOME GRID =====
function buildWelcomeGrid() {
  const grid = document.getElementById('welcome-grid');
  for (const [key, meta] of Object.entries(sopMeta)) {
    const card = document.createElement('div');
    card.className = 'welcome-card';
    card.innerHTML = '<div class="wc-icon">' + meta.emoji + '</div>' +
      '<div class="wc-name">' + meta.name + '</div>' +
      '<div class="wc-cat">' + meta.category + '</div>';
    card.addEventListener('click', () => loadSOP(key));
    grid.appendChild(card);
  }
}

// ===== SOP LOADER =====
let currentKey = null;

function loadSOP(key) {
  if (!sopContent[key]) return;
  currentKey = key;
  const meta = sopMeta[key];

  // Update nav state
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + key);
  if (navEl) { navEl.classList.add('active'); navEl.scrollIntoView({block:'nearest'}); }

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('sop-view').style.display = 'block';
  document.getElementById('sop-title').textContent = meta.emoji + ' ' + meta.name;
  document.getElementById('sop-badge').textContent = meta.category;

  // Configure marked
  const renderer = new marked.Renderer();
  marked.setOptions({ breaks: true, gfm: true, renderer });

  const html = marked.parse(sopContent[key]);
  const body = document.getElementById('content-body');
  body.innerHTML = html;

  // Process callouts
  body.querySelectorAll('blockquote').forEach(bq => {
    const text = bq.textContent;
    if (text.includes('⚠️') || /(warning|caution|irreversible)/i.test(text)) {
      bq.classList.add('warning');
    } else if (/(tip|note:|best practice)/i.test(text)) {
      bq.classList.add('tip');
    }
  });

  // Wrap code blocks with copy button
  body.querySelectorAll('pre').forEach(pre => {
    const wrapper = document.createElement('div');
    wrapper.className = 'code-wrapper';
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(pre);
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
      const code = pre.querySelector('code');
      const text = code ? code.textContent : pre.textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    });
    wrapper.appendChild(btn);
  });

  // Syntax highlighting
  body.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });

  // Build TOC
  const headings = body.querySelectorAll('h2, h3, h4');
  const tocContainer = document.getElementById('toc-container');
  const tocList = document.getElementById('toc-list');
  tocList.innerHTML = '';
  if (headings.length >= 2) {
    headings.forEach((h, i) => {
      const id = 'h-' + i + '-' + h.textContent.toLowerCase().replace(/[^a-z0-9]+/g,'-').substring(0,40);
      h.id = id;
      const li = document.createElement('li');
      li.className = h.tagName === 'H3' ? 'toc-h3' : h.tagName === 'H4' ? 'toc-h4' : '';
      const a = document.createElement('a');
      a.href = '#' + id; a.textContent = h.textContent;
      a.addEventListener('click', e => {
        e.preventDefault();
        h.scrollIntoView({ behavior:'smooth', block:'start' });
      });
      li.appendChild(a); tocList.appendChild(li);
    });
    tocContainer.style.display = 'block';
  } else {
    tocContainer.style.display = 'none';
  }

  // Remove "Back to SOP Index" links
  body.querySelectorAll('a').forEach(a => {
    if (a.textContent.trim() === 'Back to SOP Index') {
      const p = a.closest('p');
      if (p) p.remove();
    }
  });

  window.scrollTo(0, 0);
  document.getElementById('main').scrollTop = 0;
  window.history.replaceState(null, '', '#' + key);
  closeSidebar();
}

// ===== SEARCH =====
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
let searchFocusIdx = -1;

searchInput.addEventListener('input', handleSearch);
searchInput.addEventListener('keydown', handleSearchKey);
searchInput.addEventListener('focus', () => {
  if (searchInput.value.trim().length >= 2) searchResults.classList.add('visible');
});
document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrapper')) {
    searchResults.classList.remove('visible');
    searchFocusIdx = -1;
  }
});

function handleSearch() {
  const q = searchInput.value.trim().toLowerCase();
  searchFocusIdx = -1;
  if (q.length < 2) { searchResults.classList.remove('visible'); searchResults.innerHTML = ''; return; }
  const matches = [];
  for (const [key, meta] of Object.entries(sopMeta)) {
    const nameMatch = meta.name.toLowerCase().includes(q);
    const contentMatch = sopContent[key] && sopContent[key].toLowerCase().includes(q);
    if (nameMatch || contentMatch) matches.push({ key, meta, nameMatch });
  }
  matches.sort((a,b) => (b.nameMatch?1:0) - (a.nameMatch?1:0));
  searchResults.innerHTML = '';
  if (!matches.length) {
    searchResults.innerHTML = '<div class="sr-item" style="color:var(--text-muted);justify-content:center">No results found</div>';
  } else {
    matches.slice(0,8).forEach(m => {
      const item = document.createElement('div');
      item.className = 'sr-item'; item.setAttribute('role','option');
      const emoji = document.createElement('span'); emoji.textContent = m.meta.emoji;
      const name = document.createElement('span'); name.textContent = m.meta.name;
      const cat = document.createElement('span'); cat.className = 'sr-cat'; cat.textContent = m.meta.category;
      item.appendChild(emoji); item.appendChild(name); item.appendChild(cat);
      item.addEventListener('click', () => {
        loadSOP(m.key);
        searchResults.classList.remove('visible');
        searchInput.value = '';
      });
      searchResults.appendChild(item);
    });
  }
  searchResults.classList.add('visible');
}

function handleSearchKey(e) {
  const items = searchResults.querySelectorAll('.sr-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchFocusIdx = Math.min(searchFocusIdx+1, items.length-1);
    items.forEach((item,i) => item.classList.toggle('focused', i===searchFocusIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchFocusIdx = Math.max(searchFocusIdx-1, -1);
    items.forEach((item,i) => item.classList.toggle('focused', i===searchFocusIdx));
  } else if (e.key === 'Enter') {
    if (searchFocusIdx >= 0 && items[searchFocusIdx]) items[searchFocusIdx].click();
  } else if (e.key === 'Escape') {
    searchResults.classList.remove('visible'); searchFocusIdx = -1;
  }
}

// ===== MOBILE SIDEBAR =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  buildWelcomeGrid();
  const hash = window.location.hash.slice(1);
  if (hash && sopContent[hash]) loadSOP(hash);
});
</script>
